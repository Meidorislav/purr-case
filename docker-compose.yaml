services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: purr-case-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - merchant_id=${merchant_id:-877835}
      - XSOLLA_PROJECT_ID=${XSOLLA_PROJECT_ID:-304209}
      - XSOLLA_API_KEY=${XSOLLA_API_KEY:-}
      - XSOLLA_WEBHOOK_SECRET_KEY=${XSOLLA_WEBHOOK_SECRET_KEY:-}
      - XSOLLA_SANDBOX=${XSOLLA_SANDBOX:-false}
      - XSOLLA_RETURN_URL=${XSOLLA_RETURN_URL:-http://localhost:5173}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-catAdmin}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-purrCaseInventory}
      - DATABASE_URL=postgres://${DB_USER:-catAdmin}:${DB_PASSWORD:-password}@${DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_NAME:-purrCaseInventory}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: purr-case-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend


  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-catAdmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-purrCaseInventory}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catAdmin -d purrCaseInventory"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
